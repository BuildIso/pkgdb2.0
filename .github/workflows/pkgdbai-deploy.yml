name: PkgDBAI Deploy Engine
on:
  issue_comment:
    types: [created]

jobs:
  deploy:
    # Déclenchement uniquement par l'admin sur la commande @pkgdbai deploy
    if: |
      contains(github.event.comment.body, '@pkgdbai deploy') && 
      (github.event.comment.author_association == 'OWNER' || github.event.comment.user.login == 'htmluser-hub')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main (Source)
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout GH-PAGES (Target)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Existing pkg.json
        run: |
          # 1. Définir la date au format ISO
          CURRENT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # 2. Utiliser JQ pour modifier le fichier existant
          # On prend le pkg.json existant, on met à jour la date/licence
          # et on remplace la liste 'packages' par le contenu actuel du dossier manifests/
          jq --arg date "$CURRENT_DATE" \
             --arg lic "licensement-accepted" \
             '.license = $lic | .last_update = $date | .packages = [inputs]' \
             gh-pages/pkg.json main/manifests/*.json > gh-pages/pkg_temp.json
          
          # 3. Remplacer l'ancien fichier par le nouveau
          mv gh-pages/pkg_temp.json gh-pages/pkg.json

      - name: Commit and Push to GH-PAGES
        run: |
          cd gh-pages
          git config user.name "pkgdbai"
          git config user.email "pkgdbai@bot.local"
          git add pkg.json
          # On commit seulement s'il y a des changements
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Update: pkg.json modified by @${{ github.event.comment.user.login }}" && git push origin gh-pages)
