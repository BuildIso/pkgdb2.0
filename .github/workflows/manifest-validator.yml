name: Manifest Integrity Check
on:
  pull_request:
    paths:
      - 'manifests/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: JSON Syntax Validation
        run: |
          echo "Verifying JSON syntax..."
          find manifests/ -name "*.json" -exec jq . {} +

      - name: Field Requirement Check
        run: |
          echo "Ensuring all required fields are present..."
          # Vérifie si chaque fichier contient les clés 'url' et 'hash_sha256'
          for file in manifests/*.json; do
            jq -e '.url and .hash_sha256' "$file" > /dev/null || (echo "Error: Missing fields in $file" && exit 1)
          done
          echo "All manifests are valid!"
