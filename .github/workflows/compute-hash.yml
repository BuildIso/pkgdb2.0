name: Compute Installer Hash

on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  compute:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch origin main

      - run: echo "CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep '^packages/.*\.yaml$' || true)" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml requests urllib3

      - run: |
          python - <<EOF
          import yaml, hashlib, requests, urllib3, os
          urllib3.disable_warnings()
          files = os.environ["CHANGED_FILES"].split()
          if not files:
              sys.exit(0)
          for file in files:
              data = yaml.safe_load(open(file))
              lower = {k.lower(): v for k,v in data.items()}
              for inst in lower["installers"]:
                  url = inst["installerurl"]
                  r = requests.get(url, verify=False)
                  sha = hashlib.sha256(r.content).hexdigest()
                  print(f"{url}: {sha}")
          EOF
