name: PkgDBAI Register Handler
on:
  issue_comment:
    types: [created]

jobs:
  handle-response:
    if: contains(github.event.issue.labels.*.name, 'regist-user') && github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- CAS : RÉPONSE NO ---
      - name: Process No
        if: contains(github.event.comment.body, '@pkgdbai no')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['No-Registed']
            });

      # --- CAS : RÉPONSE CONFIRM ---
      - name: Check if user already exists
        if: contains(github.event.comment.body, '@pkgdbai confirm')
        id: check_user
        run: |
          USERNAME="${{ github.event.comment.user.login }}"
          if [ -f "manifests/users/$USERNAME" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Reply if already exists
        if: steps.check_user.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "You are already registered."
            })

      - name: Create User File
        if: steps.check_user.outputs.exists == 'false' && contains(github.event.comment.body, '@pkgdbai confirm')
        env:
          USERNAME: ${{ github.event.comment.user.login }}
        run: |
          mkdir -p manifests/users
          echo "$USERNAME" > "manifests/users/$USERNAME"
          git config user.name "pkgdbai"
          git config user.email "pkgdbai@bot.local"
          git add "manifests/users/$USERNAME"
          git commit -m "Register user: $USERNAME"
          git push origin main

      - name: Add Success Label
        if: steps.check_user.outputs.exists == 'false' && contains(github.event.comment.body, '@pkgdbai confirm')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Registed']
            });
