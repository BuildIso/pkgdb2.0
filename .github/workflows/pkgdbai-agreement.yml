name: PkgDBAI License Agreement
on:
  issue_comment:
    types: [created]

jobs:
  check-agreement:
    # On vérifie que le commentaire contient le trigger et n'est pas fait par un bot
    if: contains(github.event.comment.body, '@pkgdbai agree') && github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Add License Label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['license-accepted']
            })
            
      - name: Confirm Agreement
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Thank you! The license has been accepted. Label `license-accepted` added. ✅"
            })
