name: Validate Manifest

on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml requests

      - name: Get changed files
        id: changes
        run: |
          echo "CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep '^packages/.*\.yaml$' || true)" >> $GITHUB_ENV

      - name: Validate schema
        run: |
          python - <<EOF
          import yaml, sys, os
          files = os.environ["CHANGED_FILES"].split()
          if not files:
              sys.exit(0)
          for file in files:
              data = yaml.safe_load(open(file, "r", encoding="utf-8"))
              lower = {k.lower(): v for k,v in data.items()}
              required = ["id","version","name","publisher","installertype","installers"]
              for r in required:
                  if r not in lower:
                      print(f"Missing required field '{r}' in {file}")
                      sys.exit(1)
              parts = file.split("/")
              vendor = parts[1]
              app = parts[2]
              version = parts[3]
              if lower["id"] != f"{vendor}.{app}":
                  print(f"Id mismatch in {file}")
                  sys.exit(1)
              if lower["version"] != version:
                  print(f"Version mismatch in {file}")
                  sys.exit(1)
          EOF

      - name: Validate installer URLs
        run: |
          python - <<EOF
          import yaml, sys, os, requests
          files = os.environ["CHANGED_FILES"].split()
          if not files:
              sys.exit(0)
          for file in files:
              data = yaml.safe_load(open(file, "r", encoding="utf-8"))
              lower = {k.lower(): v for k,v in data.items()}
              for inst in lower["installers"]:
                  url = inst["installerurl"]
                  try:
                      r = requests.head(url, timeout=10, verify=False)
                      if r.status_code >= 400:
                          print(f"Invalid URL in {file}: {url}")
                          sys.exit(1)
                  except:
                      print(f"URL unreachable in {file}: {url}")
                      sys.exit(1)
          EOF
