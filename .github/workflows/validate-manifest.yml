name: Validate Manifest

on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml requests

      - name: Validate YAML syntax
        run: |
          python - <<EOF
          import yaml, sys, glob
          for file in glob.glob("packages/**/*.yaml", recursive=True):
              try:
                  yaml.safe_load(open(file, "r", encoding="utf-8"))
              except Exception as e:
                  print(f"Invalid YAML in {file}: {e}")
                  sys.exit(1)
          EOF

      - name: Validate manifest schema (lowercase)
        run: |
          python - <<EOF
          import yaml, sys, glob

          required = ["id", "version", "name", "publisher", "installertype", "installers"]

          for file in glob.glob("packages/**/*.yaml", recursive=True):
              data = yaml.safe_load(open(file, "r", encoding="utf-8"))
              lower = {k.lower(): v for k, v in data.items()}

              for field in required:
                  if field not in lower:
                      print(f"Missing required field '{field}' in {file}")
                      sys.exit(1)

              parts = file.split("/")
              vendor, app, version = parts[1], parts[2], parts[3]

              if lower["id"] != f"{vendor}.{app}":
                  print(f"Id mismatch in {file}")
                  sys.exit(1)

              if lower["version"] != version:
                  print(f"Version mismatch in {file}")
                  sys.exit(1)
          EOF

      - name: Validate installer URLs
        run: |
          python - <<EOF
          import yaml, sys, glob, requests

          for file in glob.glob("packages/**/*.yaml", recursive=True):
              data = yaml.safe_load(open(file, "r", encoding="utf-8"))
              lower = {k.lower(): v for k, v in data.items()}

              for inst in lower["installers"]:
                  url = inst["installerurl"]
                  try:
                      r = requests.head(url, timeout=10, verify=False)
                      if r.status_code >= 400:
                          print(f"Invalid URL in {file}: {url}")
                          sys.exit(1)
                  except Exception:
                      print(f"URL unreachable in {file}: {url}")
                      sys.exit(1)
          EOF
