name: "📦 New Package Request"
description: "Submit a new software manifest to the repository"
title: "[Package]: "
labels: ["new-package"]
body:
  - type: input
    id: pkg_name
    attributes:
      label: "Package Name"
      placeholder: "e.g., my-awesome-app"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Version"
      placeholder: "e.g., 1.0.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Description"
      placeholder: "What does this software do?"
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: "Architecture"
      options:
        - "x64"
        - "x86"
        - "arm64"
        - "all"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: "Download URL"
      placeholder: "https://example.com/installer.exe"
    validations:
      required: true
  - type: input
    id: hash_sha256
    attributes:
      label: "SHA256 Hash"
      placeholder: "Put the file hash here"
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: "License"
      placeholder: "e.g., MIT, GPL-3.0, Freeware"
  - type: input
    id: website
    attributes:
      label: "Official Website"
      placeholder: "https://software-home.com"
